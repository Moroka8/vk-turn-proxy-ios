name: iOS preflight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/ios-preflight.yml'
      - 'build-ios.sh'
      - 'go.mod'
      - 'go.sum'
      - 'mobile/**'
      - 'ios/**'

jobs:
  simulator-build:
    name: Build framework and simulator app
    runs-on: macos-latest

    steps:
      - name: Check out wrapper
        uses: actions/checkout@v4
        with:
          path: vk-turn-proxy-ios

      - name: Check out core
        uses: actions/checkout@v4
        with:
          repository: Moroka8/vk-turn-proxy
          ref: ios-clientcore-refactor
          path: vk-turn-proxy-core

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: vk-turn-proxy-ios/go.mod
          cache-dependency-path: |
            vk-turn-proxy-ios/go.sum
            vk-turn-proxy-core/go.sum

      - name: Test Go wrapper
        working-directory: vk-turn-proxy-ios
        run: go test ./...

      - name: Test Go core
        working-directory: vk-turn-proxy-core
        run: go test ./...

      - name: Install gomobile
        env:
          GOMOBILE_VERSION: v0.0.0-20260217195705-b56b3793a9c4
        run: |
          go install golang.org/x/mobile/cmd/gomobile@${GOMOBILE_VERSION}
          go install golang.org/x/mobile/cmd/gobind@${GOMOBILE_VERSION}
          gomobile init

      - name: Build Mobile.xcframework
        working-directory: vk-turn-proxy-ios
        run: bash ./build-ios.sh

      - name: Build iOS simulator app
        working-directory: vk-turn-proxy-ios
        run: |
          xcodebuild \
            -project ios/VKTurnProxyApp.xcodeproj \
            -scheme VKTurnProxyApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build unsigned iOS device app
        working-directory: vk-turn-proxy-ios
        run: |
          xcodebuild \
            -project ios/VKTurnProxyApp.xcodeproj \
            -scheme VKTurnProxyApp \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$PWD/build/iphoneos" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        working-directory: vk-turn-proxy-ios
        run: |
          rm -rf build/ipa build/VKTurnProxyApp-unsigned.ipa
          mkdir -p build/ipa/Payload
          cp -R build/iphoneos/VKTurnProxyApp.app build/ipa/Payload/
          (cd build/ipa && zip -qry ../VKTurnProxyApp-unsigned.ipa Payload)

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: VKTurnProxyApp-unsigned-ipa
          path: vk-turn-proxy-ios/build/VKTurnProxyApp-unsigned.ipa
          if-no-files-found: error
